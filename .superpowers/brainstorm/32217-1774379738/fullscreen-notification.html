<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full-Screen Timer Notification</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* === FULL-SCREEN OVERLAY === */
  .overlay {
    position: fixed;
    inset: 0;
    /* Dato-inspired warm dark gradient */
    background: linear-gradient(160deg, #1a1025 0%, #1e1230 25%, #261540 50%, #1a1035 75%, #120a20 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  /* Subtle animated glow behind the card */
  .overlay::before {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120, 80, 180, 0.12) 0%, transparent 70%);
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  /* === GLASS CARD === */
  .card {
    position: relative;
    width: 380px;
    padding: 48px 44px 40px;
    text-align: center;

    /* Liquid Glass */
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(50px) saturate(1.8) brightness(1.1);
    -webkit-backdrop-filter: blur(50px) saturate(1.8) brightness(1.1);
    border-radius: 20px;
    border: 0.5px solid rgba(255,255,255,0.15);
    box-shadow:
      0 0 0 0.5px rgba(255,255,255,0.05),
      0 20px 60px rgba(0,0,0,0.4),
      0 4px 16px rgba(0,0,0,0.25),
      inset 0 1px 0 rgba(255,255,255,0.1),
      inset 0 -0.5px 0 rgba(255,255,255,0.04);
  }

  /* Specular highlight */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
    pointer-events: none;
    border-radius: 20px 20px 0 0;
  }

  /* === CONTENT === */
  .icon {
    font-size: 44px;
    margin-bottom: 20px;
    filter: grayscale(0.1);
  }

  .title {
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* === BUTTONS === */
  .button-row {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 28px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    border: none;
    transition: all 0.15s ease;
    min-width: 120px;
  }

  /* Snooze — .glassProminent */
  .btn.prominent {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: rgba(255,255,255,0.95);
    font-weight: 500;
    border: 0.5px solid rgba(255,255,255,0.25);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2), inset 0 0.5px 0 rgba(255,255,255,0.12);
  }

  .btn.prominent:hover {
    background: rgba(255,255,255,0.28);
    box-shadow: 0 2px 12px rgba(0,0,0,0.25), inset 0 0.5px 0 rgba(255,255,255,0.15);
  }

  /* Dismiss — .glass */
  .btn.glass {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: rgba(255,255,255,0.6);
    font-weight: 400;
    border: 0.5px solid rgba(255,255,255,0.1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }

  .btn.glass:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.8);
  }

  /* Keyboard hint */
  .hint {
    margin-top: 24px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.3px;
  }

  .hint kbd {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.1);
    font-family: inherit;
    font-size: 10px;
    margin: 0 2px;
  }
</style>
</head>
<body>

<div class="overlay">
  <div class="card">
    <div class="icon">⏱</div>
    <div class="title">Time's Up</div>
    <div class="subtitle">Your focus session has ended.</div>

    <div class="button-row">
      <button class="btn prominent">Snooze 5m</button>
      <button class="btn glass">Dismiss</button>
    </div>

    <div class="hint">
      <kbd>Return</kbd> to snooze &nbsp;·&nbsp; <kbd>Esc</kbd> to dismiss
    </div>
  </div>
</div>

</body>
</html>
